apply plugin: 'com.android.application'

def versionPropsFile = file('version.properties')
def versionProps = new Properties()

if (versionPropsFile.canRead()) {
    versionProps.load(new FileInputStream(versionPropsFile))
} else {
    versionProps['VERSION_CODE'] = '1'
    versionProps['VERSION_NAME'] = '1.0.0'
}

def vCode = versionProps['VERSION_CODE'].toInteger()
def vName = versionProps['VERSION_NAME']

// 只有在执行打包任务时才增加版本号
gradle.taskGraph.whenReady { taskGraph ->
    if (taskGraph.hasTask(':app:assembleRelease')) {
        vCode = vCode + 1
        // 自动更新版本名末尾数字，例如 1.0.0 -> 1.0.1
        def parts = vName.split('\\.')
        if (parts.length >= 3) {
            def lastPart = parts[2].toInteger() + 1
            vName = "${parts[0]}.${parts[1]}.${lastPart}".toString()
        }
        
        versionProps['VERSION_CODE'] = vCode.toString()
        versionProps['VERSION_NAME'] = vName.toString()
        versionProps.store(versionPropsFile.newWriter(), null)
    }
}

android {
    namespace "work.daqian.ai"
    compileSdk rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "work.daqian.ai"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode vCode
        versionName vName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    buildTypes {
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            
            // 自定义生成的 APK 文件名
            applicationVariants.all { variant ->
                variant.outputs.all { output ->
                    def date = new Date().format('yyyyMMdd')
                    def newName = "LDQ's_AI-v${vName}-${date}-${variant.buildType.name}.apk"
                    outputFileName = newName
                }
            }
        }
    }
    configurations {
        all {
            exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk7'
            exclude group: 'org.jetbrains.kotlin', module: 'kotlin-stdlib-jdk8'
            
            // 解决 androidx.browser:browser:1.9.0 要求 API 36 的冲突
            resolutionStrategy.force 'androidx.browser:browser:1.8.0'
        }
    }
}

repositories {
    maven { url 'https://maven.aliyun.com/repository/central' }
    maven { url 'https://maven.aliyun.com/repository/public' }
    maven { url 'https://maven.aliyun.com/repository/google' } //替换google()
    maven { url 'https://maven.aliyun.com/repository/gradle-plugin' }
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
